<!DOCTYPE html>
<html>
<head>
    <title>FitBro - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .phone-frame {
            width: 375px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }
        
        .header {
            background: linear-gradient(135deg, #48c774, #3ab566);
            padding: 30px 25px;
            color: white;
        }
        
        .date-section h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .date-section p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 25px;
            background: white;
        }
        
        .calorie-circle-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .calorie-circle {
            position: relative;
            width: 180px;
            height: 180px;
        }
        
        .calorie-circle svg {
            transform: rotate(-90deg);
        }
        
        .calorie-circle circle {
            fill: none;
            stroke-width: 12;
        }
        
        .circle-bg {
            stroke: #e8e8e8;
        }
        
        .circle-progress {
            stroke: #48c774;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }
        
        .calorie-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        .calorie-number {
            font-size: 48px;
            font-weight: 700;
            color: #2c3e50;
            line-height: 1;
        }
        
        .calorie-label {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 5px;
        }
        
        .macros {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .macro-card {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }
        
        .macro-card.protein {
            background: #e3f2fd;
        }
        
        .macro-card.carbs {
            background: #fff3e0;
        }
        
        .macro-card.fats {
            background: #f3e5f5;
        }
        
        .macro-label {
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 5px;
        }
        
        .macro-value {
            font-size: 24px;
            font-weight: 700;
        }
        
        .macro-card.protein .macro-value {
            color: #1976d2;
        }
        
        .macro-card.carbs .macro-value {
            color: #f57c00;
        }
        
        .macro-card.fats .macro-value {
            color: #7b1fa2;
        }
        
        .meals-section {
            margin-bottom: 20px;
        }
        
        .meal-card {
            background: linear-gradient(135deg, #48c774, #3ab566);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .meal-card:hover {
            transform: translateY(-2px);
        }
        
        .meal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        
        .meal-header h3 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .meal-calories {
            font-size: 22px;
            font-weight: 700;
        }
        
        .meal-items {
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
        }
        
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background: linear-gradient(135deg, #2d6a4f, #1b4332);
        }
        
        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .nav-dot.active {
            background: white;
            width: 25px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="header">
            <div class="date-section">
                <h1>Today</h1>
                <p id="current-date">Monday, Nov 10</p>
            </div>
        </div>
        
        <div class="content">
            <div class="calorie-circle-container">
                <div class="calorie-circle">
                    <svg width="180" height="180">
                        <circle class="circle-bg" cx="90" cy="90" r="80"></circle>
                        <circle class="circle-progress" cx="90" cy="90" r="80" 
                                id="progress-circle"
                                stroke-dasharray="502.4" 
                                stroke-dashoffset="502.4"></circle>
                    </svg>
                    <div class="calorie-text">
                        <div class="calorie-number" id="calories-remaining">2000</div>
                        <div class="calorie-label">remaining</div>
                    </div>
                </div>
            </div>
            
            <div class="macros">
                <div class="macro-card protein">
                    <div class="macro-label">Protein</div>
                    <div class="macro-value" id="protein-value">0g</div>
                </div>
                <div class="macro-card carbs">
                    <div class="macro-label">Carbs</div>
                    <div class="macro-value" id="carbs-value">0g</div>
                </div>
                <div class="macro-card fats">
                    <div class="macro-label">Fats</div>
                    <div class="macro-value" id="fats-value">0g</div>
                </div>
            </div>
            
            <div class="meals-section" id="meals-section">
                <!-- Meal cards will be added here -->
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-dot active" onclick="navigate('/')"></div>
            <div class="nav-dot" onclick="navigate('/add-food')"></div>
            <div class="nav-dot" onclick="navigate('/stats')"></div>
            <div class="nav-dot" onclick="navigate('/community')"></div>
            <div class="nav-dot" onclick="navigate('/profile')"></div>
        </div>
    </div>

    <script>
        // Set current date
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const today = new Date();
        document.getElementById('current-date').textContent = 
            `${days[today.getDay()]}, ${months[today.getMonth()]} ${today.getDate()}`;
        
        // Navigation function
        function navigate(path) {
            window.location.href = path;
        }
        
        // Load today's food and organize by meal
        fetch('/api/food-log')
            .then(response => response.json())
            .then(data => {
                displayMealCards(data);
                calculateTotals(data);
            })
            .catch(error => {
                console.log('No data yet');
                displayMealCards([]);
            });

        function displayMealCards(foods) {
            const mealsSection = document.getElementById('meals-section');
            const mealTypes = ['Breakfast', 'Lunch', 'Dinner', 'Snack'];
            
            // Group foods by meal type
            const mealGroups = {};
            mealTypes.forEach(type => {
                mealGroups[type] = foods.filter(f => f.meal_type === type);
            });
            
            // Create meal cards
            mealsSection.innerHTML = mealTypes.map(mealType => {
                const mealFoods = mealGroups[mealType];
                const totalCalories = mealFoods.reduce((sum, f) => sum + (f.calories * f.servings), 0);
                const foodCount = mealFoods.length;
                
                return `
                    <div class="meal-card" onclick="viewMeal('${mealType}')">
                        <div class="meal-header">
                            <h3>${mealType}</h3>
                            <div class="meal-calories">${Math.round(totalCalories)} cal</div>
                        </div>
                        ${foodCount > 0 ? `
                            <div class="meal-items">${foodCount} item${foodCount !== 1 ? 's' : ''}</div>
                        ` : `
                            <div class="meal-items">No items yet</div>
                        `}
                    </div>
                `;
            }).join('');
        }
        
        function viewMeal(mealType) {
            window.location.href = `/meal/${mealType}`;
        }

        function calculateTotals(meals) {
            const totalCalories = 2000;
            let consumed = 0;
            let totalProtein = 0;
            let totalCarbs = 0;
            let totalFat = 0;

            meals.forEach(meal => {
                consumed += meal.calories * meal.servings;
                totalProtein += meal.protein * meal.servings;
                totalCarbs += meal.carbs * meal.servings;
                totalFat += meal.fat * meal.servings;
            });

            const remaining = totalCalories - consumed;
            document.getElementById('calories-remaining').textContent = Math.round(remaining);
            document.getElementById('protein-value').textContent = Math.round(totalProtein) + 'g';
            document.getElementById('carbs-value').textContent = Math.round(totalCarbs) + 'g';
            document.getElementById('fats-value').textContent = Math.round(totalFat) + 'g';
            
            // Update circle
            const percentage = (consumed / totalCalories) * 100;
            const circumference = 502.4;
            const offset = circumference - (percentage / 100 * circumference);
            document.getElementById('progress-circle').style.strokeDashoffset = offset;
        }
    </script>
</body>
</html>
