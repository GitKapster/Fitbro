<!DOCTYPE html>
<html>
<head>
    <title>FitBro - Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .phone-frame {
            width: 375px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            height: 667px;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(135deg, #48c774, #3ab566);
            padding: 30px 25px;
            color: white;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }
        
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .profile-item {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .profile-item h3 {
            font-size: 16px;
            color: #2c3e50;
            margin-bottom: 3px;
        }
        
        .profile-item p {
            font-size: 13px;
            color: #7f8c8d;
        }
        
        .profile-value {
            font-size: 18px;
            font-weight: 600;
            color: #48c774;
        }
        
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background: linear-gradient(135deg, #2d6a4f, #1b4332);
        }
        
        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .nav-dot.active {
            background: white;
            width: 25px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="header">
            <h1>Profile</h1>
        </div>
        
        <div class="content">
            <div class="profile-item">
                <div>
                    <h3>Daily Calorie Goal</h3>
                    <p>Target calories per day</p>
                </div>
                <div class="profile-value">2000</div>
            </div>
            
            <div class="profile-item">
                <div>
                    <h3>Protein Goal</h3>
                    <p>Target protein per day</p>
                </div>
                <div class="profile-value">150g</div>
            </div>
            
            <div class="profile-item">
                <div>
                    <h3>Carbs Goal</h3>
                    <p>Target carbs per day</p>
                </div>
                <div class="profile-value">200g</div>
            </div>
            
            <div class="profile-item">
                <div>
                    <h3>Fat Goal</h3>
                    <p>Target fat per day</p>
                </div>
                <div class="profile-value">65g</div>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-dot" onclick="navigate('/')"></div>
            <div class="nav-dot" onclick="navigate('/add-food')"></div>
            <div class="nav-dot" onclick="navigate('/stats')"></div>
            <div class="nav-dot" onclick="navigate('/community')"></div>
            <div class="nav-dot active"></div>
        </div>
    </div>

    <script>
        function navigate(path) {
            window.location.href = path;
        }
    </script>
</body>
</html>
