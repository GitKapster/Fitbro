<!DOCTYPE html>
<html>
<head>
    <title>FitBro - Add Food</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .phone-frame {
            width: 375px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
            height: 667px;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(135deg, #48c774, #3ab566);
            padding: 20px;
            color: white;
            flex-shrink: 0;
        }
        
        .header-top {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .back-button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: background 0.3s;
        }
        
        .back-button:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .search-container {
            position: relative;
            flex: 1;
        }
        
        .search-box {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            background: white;
            outline: none;
        }
        
        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #95a5a6;
            font-size: 16px;
        }
        
        .content {
            flex: 1;
            overflow-y: auto;
            background: white;
        }
        
        .section-header {
            padding: 15px 20px 10px 20px;
            font-size: 12px;
            font-weight: 600;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #f8f9fa;
        }
        
        .food-list {
            background: white;
        }
        
        .food-item {
            padding: 15px 20px;
            border-bottom: 1px solid #ecf0f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .food-item:hover {
            background: #f8f9fa;
        }
        
        .food-item:active {
            background: #ecf0f1;
        }
        
        .food-info h3 {
            font-size: 16px;
            color: #2c3e50;
            margin-bottom: 4px;
            font-weight: 600;
        }
        
        .food-info p {
            font-size: 13px;
            color: #95a5a6;
        }
        
        .food-calories {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .calories-value {
            font-size: 15px;
            color: #7f8c8d;
            font-weight: 500;
        }
        
        .add-button {
            background: #48c774;
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        
        .add-button:hover {
            background: #3ab566;
            transform: scale(1.1);
        }
        
        .add-button:active {
            transform: scale(0.95);
        }
        
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background: linear-gradient(135deg, #2d6a4f, #1b4332);
            flex-shrink: 0;
        }
        
        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .nav-dot.active {
            background: white;
            width: 25px;
            border-radius: 4px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #95a5a6;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="header">
            <div class="header-top">
                <button class="back-button" onclick="goBack()">‹</button>
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input 
                        type="text" 
                        class="search-box" 
                        placeholder="Search foods..."
                        id="search-input"
                        oninput="searchFoods()"
                    >
                </div>
            </div>
        </div>
        
        <div class="content" id="food-content">
            <!-- Recent Section -->
            <div class="section-header">RECENT</div>
            <div class="food-list" id="recent-foods">
                <div class="food-item" onclick="showAddModal('Chicken Breast', 165, '100g')">
                    <div class="food-info">
                        <h3>Chicken Breast</h3>
                        <p>100g</p>
                    </div>
                    <div class="food-calories">
                        <span class="calories-value">165 cal</span>
                        <button class="add-button">+</button>
                    </div>
                </div>
                
                <div class="food-item" onclick="showAddModal('Brown Rice', 215, '1 cup')">
                    <div class="food-info">
                        <h3>Brown Rice</h3>
                        <p>1 cup</p>
                    </div>
                    <div class="food-calories">
                        <span class="calories-value">215 cal</span>
                        <button class="add-button">+</button>
                    </div>
                </div>
                
                <div class="food-item" onclick="showAddModal('Avocado', 240, '1 whole')">
                    <div class="food-info">
                        <h3>Avocado</h3>
                        <p>1 whole</p>
                    </div>
                    <div class="food-calories">
                        <span class="calories-value">240 cal</span>
                        <button class="add-button">+</button>
                    </div>
                </div>
            </div>
            
            <!-- Popular Section -->
            <div class="section-header">POPULAR</div>
            <div class="food-list" id="popular-foods">
                <div class="food-item" onclick="showAddModal('Banana', 105, '1 medium')">
                    <div class="food-info">
                        <h3>Banana</h3>
                        <p>1 medium</p>
                    </div>
                    <div class="food-calories">
                        <span class="calories-value">105 cal</span>
                        <button class="add-button">+</button>
                    </div>
                </div>
                
                <div class="food-item" onclick="showAddModal('Greek Yogurt', 100, '170g')">
                    <div class="food-info">
                        <h3>Greek Yogurt</h3>
                        <p>170g</p>
                    </div>
                    <div class="food-calories">
                        <span class="calories-value">100 cal</span>
                        <button class="add-button">+</button>
                    </div>
                </div>
                
                <div class="food-item" onclick="showAddModal('Almonds', 160, '28g')">
                    <div class="food-info">
                        <h3>Almonds</h3>
                        <p>28g</p>
                    </div>
                    <div class="food-calories">
                        <span class="calories-value">160 cal</span>
                        <button class="add-button">+</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-dot"></div>
            <div class="nav-dot active"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
        </div>
    </div>

    <script>
        function goBack() {
            window.location.href = '/';
        }
        
        function showAddModal(name, calories, serving) {
            // For now, just add directly
            // Later we can add a modal for portion selection
            const meal_type = prompt('Which meal? (Breakfast/Lunch/Dinner/Snack)', 'Lunch');
            if (meal_type) {
                addFoodToLog(name, calories, serving, meal_type);
            }
        }
        
        function addFoodToLog(name, calories, serving, meal_type) {
            // This would connect to your API
            fetch('/api/add-food', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    food_id: 1, // Would be real ID from database
                    meal_type: meal_type,
                    servings: 1
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert(`Added ${name} to ${meal_type}!`);
                    window.location.href = '/';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Added! (Demo mode - not saved to database)');
                window.location.href = '/';
            });
        }
        
        function searchFoods() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const allFoodItems = document.querySelectorAll('.food-item');
            
            if (searchTerm === '') {
                // Show all sections
                document.querySelectorAll('.section-header').forEach(h => h.style.display = 'block');
                allFoodItems.forEach(item => item.style.display = 'flex');
                return;
            }
            
            // Hide section headers during search
            document.querySelectorAll('.section-header').forEach(h => h.style.display = 'none');
            
            let foundAny = false;
            allFoodItems.forEach(item => {
                const foodName = item.querySelector('h3').textContent.toLowerCase();
                if (foodName.includes(searchTerm)) {
                    item.style.display = 'flex';
                    foundAny = true;
                } else {
                    item.style.display = 'none';
                }
            });
            
            if (!foundAny) {
                document.getElementById('food-content').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <p>No foods found</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
