<!DOCTYPE html>
<html>
<head>
    <title>FitBro - Add Food</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .phone-frame {
            width: 375px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            height: 667px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .header {
            background: linear-gradient(135deg, #48c774, #3ab566);
            padding: 20px;
            color: white;
            flex-shrink: 0;
        }
        
        .header-top {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .back-button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
        }
        
        .search-container {
            position: relative;
            flex: 1;
        }
        
        .search-box {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            background: white;
            outline: none;
        }
        
        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #95a5a6;
            font-size: 16px;
        }
        
        .content {
            flex: 1;
            overflow-y: auto;
            background: white;
        }
        
        .section-header {
            padding: 15px 20px 10px 20px;
            font-size: 12px;
            font-weight: 600;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #f8f9fa;
        }
        
        .food-list {
            background: white;
        }
        
        .food-item {
            padding: 15px 20px;
            border-bottom: 1px solid #ecf0f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .food-item:hover {
            background: #f8f9fa;
        }
        
        .food-info h3 {
            font-size: 16px;
            color: #2c3e50;
            margin-bottom: 4px;
            font-weight: 600;
        }
        
        .food-info p {
            font-size: 13px;
            color: #95a5a6;
        }
        
        .food-calories {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .calories-value {
            font-size: 15px;
            color: #7f8c8d;
            font-weight: 500;
        }
        
        .add-button {
            background: #48c774;
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background: linear-gradient(135deg, #2d6a4f, #1b4332);
            flex-shrink: 0;
        }
        
        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .nav-dot.active {
            background: white;
            width: 25px;
            border-radius: 4px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #95a5a6;
        }

        /* Meal picker modal */
        .modal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 10;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: white;
            border-radius: 20px;
            padding: 25px;
            width: 80%;
        }

        .modal-box p {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .modal-box select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            margin-bottom: 15px;
        }

        .modal-confirm {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #48c774, #3ab566);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-cancel {
            width: 100%;
            padding: 10px;
            background: none;
            border: 1px solid #ecf0f1;
            border-radius: 10px;
            color: #95a5a6;
            font-size: 13px;
            cursor: pointer;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">

        <!-- Meal picker modal -->
        <div class="modal" id="meal-modal">
            <div class="modal-box">
                <p>Which meal?</p>
                <select id="meal-select">
                    <option value="Breakfast">Breakfast</option>
                    <option value="Lunch">Lunch</option>
                    <option value="Dinner">Dinner</option>
                    <option value="Snack">Snack</option>
                </select>
                <button class="modal-confirm" onclick="confirmMeal()">Add</button>
                <button class="modal-cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>

        <div class="header">
            <div class="header-top">
                <button class="back-button" onclick="goBack()">‹</button>
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input 
                        type="text" 
                        class="search-box" 
                        placeholder="Search foods..."
                        id="search-input"
                        oninput="searchFoods()"
                    >
                </div>
            </div>
        </div>
        
        <div class="content" id="food-content">
            <div class="section-header">RECENT</div>
            <div class="food-list" id="recent-foods">
                <div class="food-item" onclick="addFoodItem(1, 'Chicken Breast', 165, 31, 0, 3.6, '100g')">
                    <div class="food-info">
                        <h3>Chicken Breast</h3>
                        <p>100g</p>
                    </div>
                    <div class="food-calories">
                        <span class="calories-value">165 cal</span>
                        <button class="add-button">+</button>
                    </div>
                </div>
                
                <div class="food-item" onclick="addFoodItem(2, 'Brown Rice', 215, 5, 45, 1.6, '1 cup')">
                    <div class="food-info">
                        <h3>Brown Rice</h3>
                        <p>1 cup</p>
                    </div>
                    <div class="food-calories">
                        <span class="calories-value">215 cal</span>
                        <button class="add-button">+</button>
                    </div>
                </div>
                
                <div class="food-item" onclick="addFoodItem(3, 'Avocado', 240, 3, 13, 22, '1 whole')">
                    <div class="food-info">
                        <h3>Avocado</h3>
                        <p>1 whole</p>
                    </div>
                    <div class="food-calories">
                        <span class="calories-value">240 cal</span>
                        <button class="add-button">+</button>
                    </div>
                </div>
            </div>
            
            <div class="section-header">POPULAR</div>
            <div class="food-list" id="popular-foods">
                <div class="food-item" onclick="addFoodItem(4, 'Banana', 105, 1.3, 27, 0.4, '1 medium')">
                    <div class="food-info">
                        <h3>Banana</h3>
                        <p>1 medium</p>
                    </div>
                    <div class="food-calories">
                        <span class="calories-value">105 cal</span>
                        <button class="add-button">+</button>
                    </div>
                </div>
                
                <div class="food-item" onclick="addFoodItem(5, 'Greek Yogurt', 100, 17, 6, 0.7, '170g')">
                    <div class="food-info">
                        <h3>Greek Yogurt</h3>
                        <p>170g</p>
                    </div>
                    <div class="food-calories">
                        <span class="calories-value">100 cal</span>
                        <button class="add-button">+</button>
                    </div>
                </div>
                
                <div class="food-item" onclick="addFoodItem(6, 'Almonds', 160, 6, 6, 14, '28g')">
                    <div class="food-info">
                        <h3>Almonds</h3>
                        <p>28g</p>
                    </div>
                    <div class="food-calories">
                        <span class="calories-value">160 cal</span>
                        <button class="add-button">+</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-dot" onclick="navigate('/')"></div>
            <div class="nav-dot active"></div>
            <div class="nav-dot" onclick="navigate('/stats')"></div>
            <div class="nav-dot" onclick="navigate('/community')"></div>
            <div class="nav-dot" onclick="navigate('/profile')"></div>
        </div>
    </div>

    <script>
        // Get meal type and date from URL if passed
        const urlParams = new URLSearchParams(window.location.search);
        const mealType = urlParams.get('meal');
        const logDate  = urlParams.get('date');

        // Holds the food id waiting for meal selection
        let pendingFoodId = null;
        
        function navigate(path) {
            window.location.href = path;
        }
        
        function goBack() {
            if (logDate)       window.location.href = '/stats';
            else if (mealType) window.location.href = `/meal/${mealType}`;
            else               window.location.href = '/';
        }
        
        function addFoodItem(foodId) {
            if (mealType) {
                // Meal type already set in URL, skip the modal
                addToLog(foodId, mealType);
            } else {
                // Show dropdown modal
                pendingFoodId = foodId;
                document.getElementById('meal-modal').style.display = 'flex';
            }
        }

        function confirmMeal() {
            const meal = document.getElementById('meal-select').value;
            const foodId = pendingFoodId; // save before closeModal wipes it
            closeModal();
            addToLog(foodId, meal);
        }

        function closeModal() {
            document.getElementById('meal-modal').style.display = 'none';
            pendingFoodId = null;
        }
        
        function addToLog(foodId, meal) {
            fetch('/api/add-food', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    food_id:   foodId,
                    meal_type: meal,
                    servings:  1,
                    date:      logDate || undefined
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    if (logDate)       window.location.href = '/stats';
                    else if (mealType) window.location.href = `/meal/${mealType}`;
                    else               window.location.href = '/';
                }
            })
            .catch(() => {
                if (logDate)       window.location.href = '/stats';
                else if (mealType) window.location.href = `/meal/${mealType}`;
                else               window.location.href = '/';
            });
        }
        
        function searchFoods() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const allFoodItems = document.querySelectorAll('.food-item');
            
            if (searchTerm === '') {
                document.querySelectorAll('.section-header').forEach(h => h.style.display = 'block');
                allFoodItems.forEach(item => item.style.display = 'flex');
                return;
            }
            
            document.querySelectorAll('.section-header').forEach(h => h.style.display = 'none');
            
            let foundAny = false;
            allFoodItems.forEach(item => {
                const foodName = item.querySelector('h3').textContent.toLowerCase();
                if (foodName.includes(searchTerm)) {
                    item.style.display = 'flex';
                    foundAny = true;
                } else {
                    item.style.display = 'none';
                }
            });
            
            if (!foundAny) {
                document.getElementById('food-content').innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; opacity: 0.5;">🔍</div>
                        <p>No foods found</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
