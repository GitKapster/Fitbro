<!DOCTYPE html>
<html>
<head>
    <title>FitBro - Add Food</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .phone-frame {
            width: 375px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            height: 667px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, #48c774, #3ab566);
            padding: 20px;
            color: white;
            flex-shrink: 0;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .back-button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
        }

        .search-container { position: relative; flex: 1; }

        .search-box {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            background: white;
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #95a5a6;
            font-size: 16px;
        }

        .content { flex: 1; overflow-y: auto; background: white; }

        .section-header {
            padding: 15px 20px 10px 20px;
            font-size: 12px;
            font-weight: 600;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #f8f9fa;
        }

        .food-item {
            padding: 15px 20px;
            border-bottom: 1px solid #ecf0f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .food-item:hover { background: #f8f9fa; }

        .food-info h3 { font-size: 16px; color: #2c3e50; margin-bottom: 4px; font-weight: 600; }
        .food-info p  { font-size: 13px; color: #95a5a6; }

        .food-calories { display: flex; align-items: center; gap: 15px; }

        .calories-value { font-size: 15px; color: #7f8c8d; font-weight: 500; }

        /* Grams input shown on OpenFoodFacts results */
        .grams-input {
            width: 52px;
            padding: 5px 6px;
            border: 1px solid #ecf0f1;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            outline: none;
            color: #2c3e50;
        }

        .add-button {
            background: #48c774;
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background: linear-gradient(135deg, #2d6a4f, #1b4332);
            flex-shrink: 0;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transition: all 0.3s;
            cursor: pointer;
        }

        .nav-dot.active { background: white; width: 25px; border-radius: 4px; }

        .empty-state { text-align: center; padding: 40px 20px; color: #95a5a6; }

        /* Meal picker modal */
        .modal {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 10;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: white;
            border-radius: 20px;
            padding: 25px;
            width: 80%;
        }

        .modal-box p { font-size: 16px; font-weight: 600; color: #2c3e50; margin-bottom: 15px; }

        .modal-box select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            margin-bottom: 15px;
        }

        .modal-confirm {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #48c774, #3ab566);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-cancel {
            width: 100%;
            padding: 10px;
            background: none;
            border: 1px solid #ecf0f1;
            border-radius: 10px;
            color: #95a5a6;
            font-size: 13px;
            cursor: pointer;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">

        <!-- Meal picker modal -->
        <div class="modal" id="meal-modal">
            <div class="modal-box">
                <p>Which meal?</p>
                <select id="meal-select">
                    <option value="Breakfast">Breakfast</option>
                    <option value="Lunch">Lunch</option>
                    <option value="Dinner">Dinner</option>
                    <option value="Snack">Snack</option>
                </select>
                <button class="modal-confirm" onclick="confirmMeal()">Add</button>
                <button class="modal-cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>

        <div class="header">
            <div class="header-top">
                <button class="back-button" onclick="goBack()">‹</button>
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input
                        type="text"
                        class="search-box"
                        placeholder="Search any food..."
                        id="search-input"
                        oninput="onSearchInput()"
                    >
                </div>
            </div>
        </div>

        <div class="content" id="food-content">
            <!-- Static quick-access foods shown when search is empty -->
            <div id="static-sections">
                <div class="section-header">RECENT</div>
                <div class="food-item" onclick="addStaticFood(1)">
                    <div class="food-info"><h3>Chicken Breast</h3><p>100g</p></div>
                    <div class="food-calories"><span class="calories-value">165 cal</span><button class="add-button">+</button></div>
                </div>
                <div class="food-item" onclick="addStaticFood(2)">
                    <div class="food-info"><h3>Brown Rice</h3><p>1 cup</p></div>
                    <div class="food-calories"><span class="calories-value">215 cal</span><button class="add-button">+</button></div>
                </div>
                <div class="food-item" onclick="addStaticFood(3)">
                    <div class="food-info"><h3>Avocado</h3><p>1 whole</p></div>
                    <div class="food-calories"><span class="calories-value">240 cal</span><button class="add-button">+</button></div>
                </div>

                <div class="section-header">POPULAR</div>
                <div class="food-item" onclick="addStaticFood(4)">
                    <div class="food-info"><h3>Banana</h3><p>1 medium</p></div>
                    <div class="food-calories"><span class="calories-value">105 cal</span><button class="add-button">+</button></div>
                </div>
                <div class="food-item" onclick="addStaticFood(5)">
                    <div class="food-info"><h3>Greek Yogurt</h3><p>170g</p></div>
                    <div class="food-calories"><span class="calories-value">100 cal</span><button class="add-button">+</button></div>
                </div>
                <div class="food-item" onclick="addStaticFood(6)">
                    <div class="food-info"><h3>Almonds</h3><p>28g</p></div>
                    <div class="food-calories"><span class="calories-value">160 cal</span><button class="add-button">+</button></div>
                </div>
            </div>

            <!-- OpenFoodFacts search results injected here when user types -->
            <div id="off-results" style="display:none;"></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-dot" onclick="navigate('/')"></div>
            <div class="nav-dot active"></div>
            <div class="nav-dot" onclick="navigate('/stats')"></div>
            <div class="nav-dot" onclick="navigate('/community')"></div>
            <div class="nav-dot" onclick="navigate('/profile')"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mealType = urlParams.get('meal');
        const logDate  = urlParams.get('date');

        // pendingFoodId  → waiting to log a static (DB) food
        // pendingOFFFood → waiting to log an OpenFoodFacts food
        let pendingFoodId  = null;
        let pendingOFFFood = null;

        // Debounce timer so we don't hit the API on every single keystroke
        let searchTimer = null;

        function navigate(path) { window.location.href = path; }

        function goBack() {
            if (logDate)       window.location.href = '/stats';
            else if (mealType) window.location.href = `/meal/${mealType}`;
            else               window.location.href = '/';
        }

        // ── Search input handler ──────────────────────────────────────────
        function onSearchInput() {
            const q = document.getElementById('search-input').value.trim();

            clearTimeout(searchTimer);

            if (!q) {
                // Empty search — go back to showing the static sections
                document.getElementById('static-sections').style.display = 'block';
                document.getElementById('off-results').style.display = 'none';
                return;
            }

            // Hide static sections while searching
            document.getElementById('static-sections').style.display = 'none';
            document.getElementById('off-results').style.display = 'block';
            document.getElementById('off-results').innerHTML =
                '<div class="empty-state">Searching...</div>';

            // Wait 400ms after the user stops typing before hitting the API
            searchTimer = setTimeout(() => searchOpenFoodFacts(q), 400);
        }

        // ── Fetch from OpenFoodFacts via Flask (avoids CORS) ─────────────
        async function searchOpenFoodFacts(q) {
            try {
                // Call our own Flask endpoint — it fetches from OpenFoodFacts server-side
                const res  = await fetch(`/api/search-food?q=${encodeURIComponent(q)}`);
                const valid = await res.json();

                if (!valid.length) {
                    document.getElementById('off-results').innerHTML =
                        '<div class="empty-state">No results found — OpenFoodFacts may be temporarily down. Try again in a minute.</div>';
                    return;
                }

                // Store results so addOFFFood() can read them by index
                window._offResults = valid;

                const html = valid.map((p, i) => {
                    const cal  = Math.round(p.calories ?? 0);
                    const pro  = (p.protein ?? 0).toFixed(1);
                    const carb = (p.carbs   ?? 0).toFixed(1);
                    const fat  = (p.fat     ?? 0).toFixed(1);
                    const brand = p.brand ? ` · ${p.brand}` : '';

                    return `
                        <div class="food-item">
                            <div class="food-info">
                                <h3>${p.name}</h3>
                                <p>${cal} kcal · ${pro}g P · ${carb}g C · ${fat}g F${brand} <span style="font-size:11px">(per 100g)</span></p>
                            </div>
                            <div class="food-calories">
                                <input class="grams-input" type="number" min="1" value="100"
                                    id="grams-${i}" onclick="event.stopPropagation()" />
                                <button class="add-button" onclick="addOFFFood(${i})">+</button>
                            </div>
                        </div>`;
                }).join('');

                document.getElementById('off-results').innerHTML =
                    `<div class="section-header">RESULTS FROM OPENFOODFACTS</div>` + html;

            } catch (e) {
                document.getElementById('off-results').innerHTML =
                    '<div class="empty-state">Search failed. Make sure Flask is running.</div>';
            }
        }

        // ── Add a static (DB) food ────────────────────────────────────────
        function addStaticFood(foodId) {
            if (mealType) {
                addStaticToLog(foodId, mealType);
            } else {
                pendingFoodId  = foodId;
                pendingOFFFood = null;
                document.getElementById('meal-modal').style.display = 'flex';
            }
        }

        // ── Add an OpenFoodFacts food ─────────────────────────────────────
        function addOFFFood(index) {
            const p = window._offResults[index];
            const n = p.nutriments;
            const grams = parseFloat(document.getElementById(`grams-${index}`).value) || 100;

            // Bundle up everything we need to send to the server
            pendingOFFFood = {
                name:    p.product_name,
                calories: n['energy-kcal_100g'] ?? 0,
                protein:  n['proteins_100g'] ?? 0,
                carbs:    n['carbohydrates_100g'] ?? 0,
                fat:      n['fat_100g'] ?? 0,
                grams:    grams
            };
            pendingFoodId = null;

            if (mealType) {
                addOFFToLog(pendingOFFFood, mealType);
            } else {
                document.getElementById('meal-modal').style.display = 'flex';
            }
        }

        // ── Modal confirm — works for both food types ─────────────────────
        function confirmMeal() {
            const meal = document.getElementById('meal-select').value;
            const offFood = pendingOFFFood;
            const staticId = pendingFoodId;
            closeModal();

            if (offFood) {
                addOFFToLog(offFood, meal);
            } else if (staticId) {
                addStaticToLog(staticId, meal);
            }
        }

        function closeModal() {
            document.getElementById('meal-modal').style.display = 'none';
            pendingFoodId  = null;
            pendingOFFFood = null;
        }

        // ── POST a static DB food to /api/add-food ────────────────────────
        function addStaticToLog(foodId, meal) {
            fetch('/api/add-food', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    food_id:   foodId,
                    meal_type: meal,
                    servings:  1,
                    date:      logDate || undefined
                })
            })
            .then(r => r.json())
            .then(() => redirectAfterAdd());
        }

        // ── POST an OpenFoodFacts food to /api/add-openfood ───────────────
        function addOFFToLog(food, meal) {
            fetch('/api/add-openfood', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name:      food.name,
                    calories:  food.calories,
                    protein:   food.protein,
                    carbs:     food.carbs,
                    fat:       food.fat,
                    grams:     food.grams,
                    meal_type: meal,
                    date:      logDate || undefined
                })
            })
            .then(r => r.json())
            .then(() => redirectAfterAdd());
        }

        // ── Go back to wherever the user came from ────────────────────────
        function redirectAfterAdd() {
            if (logDate)       window.location.href = '/stats';
            else if (mealType) window.location.href = `/meal/${mealType}`;
            else               window.location.href = '/';
        }
    </script>
</body>
</html>
